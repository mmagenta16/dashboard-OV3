  document.getElementById('footer').textContent='OVEJITAS 3 · ENE 2026 · TC '+tc.toLocaleString()+' · v2';
  
  // Presets
  document.getElementById('presets').innerHTML=[1150,1200,1300,1430,1500].map(t=>`<button class="${tc===t?'sel':''}" onclick="document.getElementById('tcInput').value=${t}">${t}</button>`).join('');
  
  const el=document.getElementById('content');
  let h='';

  if(view==='dash'){
    h+=`<div class="row">${kpi('Presupuesto','USD '+F(bg),'30 meses')}${kpi('Ejecutado','USD '+F(rl),ex.toFixed(1)+'%','#2563EB')}${kpi('Plan a Fecha','USD '+F(pl))}${kpi('Desvío','USD '+F(Math.abs(dv)),P(dvP),dv>0?'#DC2626':'#059669')}${kpi('CPI',cpi.toFixed(2),cpi>=1?'Eficiente':'Sobrecosto',cpi>=1?'#059669':'#DC2626')}${kpi('Críticos',cr+'/21','Desvío >15%',cr>5?'#DC2626':'#D97706')}</div>`;
    h+=`<div class="row"><div class="card"><div class="kpi-label">Necesidad de Caja</div><div style="display:flex;gap:18px"><div><div style="font-size:17px;font-weight:800;color:#1D4ED8">USD ${F(c30)}</div><div style="font-size:10px;color:#94A3B8">30d</div></div><div><div style="font-size:17px;font-weight:800;color:#1D4ED8">USD ${F(c60)}</div><div style="font-size:10px;color:#94A3B8">60d</div></div><div><div style="font-size:17px;font-weight:800;color:#1D4ED8">USD ${F(c90)}</div><div style="font-size:10px;color:#94A3B8">90d</div></div></div></div>`;
    h+=`<div class="card"><div class="kpi-label">Flujo Neto</div><div style="display:flex;gap:18px"><div><div style="font-size:17px;font-weight:800;color:#059669">USD ${F(tI)}</div><div style="font-size:10px;color:#94A3B8">Cobrado</div></div><div><div style="font-size:17px;font-weight:800;color:#DC2626">USD ${F(tE)}</div><div style="font-size:10px;color:#94A3B8">Pagado</div></div><div><div style="font-size:17px;font-weight:800;color:${tI>=tE?'#059669':'#DC2626'}">USD ${F(tI-tE)}</div><div style="font-size:10px;color:#94A3B8">Neto</div></div></div></div></div>`;
    h+=`<div class="row"><div class="card chart"><div class="section-title">Curva S (USD K)</div><div style="height:230px"><canvas id="ch1"></canvas></div></div><div class="card chart"><div class="section-title">Cashflow Mensual (USD K)</div><div style="height:230px"><canvas id="ch2"></canvas></div></div></div>`;
    h+=`<div class="row"><div class="card wide"><div class="section-title">Desvío por Rubro</div>`;
    [...D.rb].sort((a,b)=>Math.abs(b.dp)-Math.abs(a.dp)).forEach(r=>{const s=ST(r.dp);const w=Math.min(Math.abs(r.dp)/1.2,100);
      h+=`<div class="bar-row" onclick="view='rub';render();setTimeout(()=>showDetail(${r.id}),50)"><div class="bar-name">${r.n}</div><div class="bar-track"><div class="bar-fill" style="background:${s.c};${r.dp>0?'left':'right'}:50%;width:${w/2}%"></div><div class="bar-center"></div></div><div class="bar-pct" style="color:${s.c}">${P(r.dp)}</div></div>`;
    });
    h+=`</div></div>`;
    el.innerHTML=h;
    setTimeout(()=>{
      makeChart('ch1','line',D.ml,[{label:'Plan',data:D.cp.map((v,i)=>Math.round(u(v)/1e3)),borderColor:'#3B82F6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3},{label:'Real',data:D.cr.map(v=>Math.round(u(v)/1e3)).concat(Array(18).fill(null)),borderColor:'#059669',borderWidth:2.5,pointRadius:2,tension:.3}]);
      makeChart('ch2','bar',D.ml.slice(0,12),[{label:'Plan',data:D.mp.slice(0,12).map(v=>Math.round(u(v)/1e3)),backgroundColor:'#DBEAFE'},{label:'Real',data:D.mr.map(v=>Math.round(u(v)/1e3)),backgroundColor:'#A7F3D0'}]);
    },50);
  }

  else if(view==='rub'){
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><span style="font-size:16px;font-weight:800">Rubros</span><span style="font-size:11px;color:#94A3B8;margin-left:8px">USD TC ${tc.toLocaleString()}</span></div></div>`;
    h+=`<div class="card" style="overflow:hidden;padding:0"><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>#</th><th>Rubro</th><th>Presup.</th><th>Ejecutado</th><th>Desvío</th><th>%</th><th>Estado</th></tr></thead><tbody>`;
    [...D.rb].sort((a,b)=>b.dp-a.dp).forEach(r=>{const s=ST(r.dp);
      h+=`<tr onclick="showDetail(${r.id})"><td style="color:#CBD5E1;font-weight:700;font-size:11px">${r.id}</td><td style="font-weight:600">${r.n}</td><td class="mono" style="text-align:right">${F(u(r.b))}</td><td class="mono" style="text-align:right">${F(u(r.r))}</td><td class="mono" style="text-align:right;font-weight:700;color:${r.r>r.b?'#DC2626':'#059669'}">${F(u(r.r-r.b))}</td><td style="text-align:right;font-weight:800;color:${s.c};font-size:11px">${P(r.dp)}</td><td style="text-align:right"><span class="badge" style="background:${s.bg};color:${s.c}">${s.l}</span></td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
    el.innerHTML=h;
  }

  else if(view==='cf'){
    h+=`<div style="margin-bottom:12px"><span style="font-size:16px;font-weight:800">Cashflow</span></div>`;
    h+=`<div class="row">${kpiSm('30d','USD '+F(c30),'','#1D4ED8')}${kpiSm('60d','USD '+F(c60),'','#1D4ED8')}${kpiSm('90d','USD '+F(c90),'','#1D4ED8')}${kpiSm('Restante','USD '+F(bg-rl))}</div>`;
    h+=`<div class="card" style="margin-bottom:12px"><div class="section-title">Plan vs Real (USD K)</div><div style="height:260px"><canvas id="ch3"></canvas></div></div>`;
    h+=`<div class="card"><div class="section-title">Acumulado (USD K)</div><div style="height:260px"><canvas id="ch4"></canvas></div></div>`;
    el.innerHTML=h;
    setTimeout(()=>{
      makeChart('ch3','bar',D.ml.slice(0,12),[{label:'Plan',data:D.mp.slice(0,12).map(v=>Math.round(u(v)/1e3)),backgroundColor:'#DBEAFE'},{label:'Real',data:D.mr.map(v=>Math.round(u(v)/1e3)),backgroundColor:'#A7F3D0'}]);
      makeChart('ch4','line',D.ml,[{label:'Plan',data:D.cp.map(v=>Math.round(u(v)/1e3)),borderColor:'#3B82F6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3},{label:'Real',data:D.cr.map(v=>Math.round(u(v)/1e3)).concat(Array(18).fill(null)),borderColor:'#059669',borderWidth:2.5,pointRadius:2,tension:.3}]);
    },50);
  }

  else if(view==='ing'){
    h+=`<div style="margin-bottom:12px"><span style="font-size:16px;font-weight:800">Ingresos</span></div>`;
    h+=`<div class="row">${kpi('Cobrado','USD '+F(tI),'','#059669')}${kpi('Pagado','USD '+F(tE),'','#DC2626')}${kpi('Neto','USD '+F(tI-tE),'',tI>=tE?'#059669':'#DC2626')}${kpi('Contratos','USD '+F(u(D.ct.t)),'Pend: '+F(u(D.ct.nv)))}</div>`;
    h+=`<div class="card" style="margin-bottom:12px"><div class="section-title">Ingresos vs Egresos (USD K)</div><div style="height:260px"><canvas id="ch5"></canvas></div></div>`;
    h+=`<div class="row"><div class="card chart"><div class="section-title">Compradores</div>`;
    D.cl.forEach(c=>{h+=`<div class="rank-row"><div class="rank-name">${c.n}</div><div class="rank-bar"><div class="rank-fill" style="width:${(c.t/D.cl[0].t*100)}%;background:linear-gradient(90deg,#6EE7B7,#34D399)"></div></div><div class="rank-val">USD ${F(u(c.t))}</div></div>`});
    h+=`</div><div class="card chart"><div class="section-title">Proveedores</div>`;
    D.pv.forEach(p=>{h+=`<div class="rank-row"><div class="rank-name">${p.n}</div><div class="rank-bar"><div class="rank-fill" style="width:${(p.t/D.pv[0].t*100)}%;background:linear-gradient(90deg,#FCA5A5,#F87171)"></div></div><div class="rank-val">USD ${F(u(p.t))}</div></div>`});
    h+=`</div></div>`;
    el.innerHTML=h;
    setTimeout(()=>{
      const lbs=D.ml.slice(0,14);
      makeChart('ch5','bar',lbs,[{label:'Ingresos',data:D.ing.map(v=>Math.round(u(v)/1e3)),backgroundColor:'#6EE7B7'},{label:'Egresos',data:D.egr.map(v=>Math.round(u(v)/1e3)),backgroundColor:'#FCA5A5'}]);
    },50);
  }

  else if(view==='gnt'){
    h+=`<div style="margin-bottom:12px"><span style="font-size:16px;font-weight:800">Cronograma</span></div><div class="row">`;
    D.rb.forEach(r=>{const s=ST(r.dp);const ps=r.mp.findIndex(v=>v>0),pe=r.mp.length-1-r.mp.slice().reverse().findIndex(v=>v>0);const rs=r.mr.findIndex(v=>v>0);if(ps<0)return;
      h+=`<div class="gantt-card" style="border-color:${s.c}" onclick="view='rub';render();setTimeout(()=>showDetail(${r.id}),50)"><div class="name">${r.n}</div><div class="dates">Plan: ${D.ml[ps]} → ${D.ml[pe]}</div>${rs>=0?`<div class="dates" style="color:${s.c};font-weight:600">Real: ${D.ml[rs]} → ${D.ml[Math.min(r.mr.length-1-r.mr.slice().reverse().findIndex(v=>v>0),11)]}</div>`:''}<div class="dev" style="color:${s.c}">${P(r.dp)} · USD ${F(u(Math.abs(r.r-r.b)))}</div></div>`;
    });
    h+=`</div>`;el.innerHTML=h;
  }

  else if(view==='alt'){
    h+=`<div style="margin-bottom:12px"><span style="font-size:16px;font-weight:800">Alertas</span></div>`;
    D.rb.filter(r=>r.dp>50).forEach(r=>{h+=`<div class="alert" style="background:#FEF2F2;border-left:4px solid #DC2626" onclick="view='rub';render();setTimeout(()=>showDetail(${r.id}),50)"><div><div class="alert-tag" style="color:#DC2626">CRÍTICO</div><div class="alert-name">${r.n}</div><div class="alert-sub">USD ${F(u(r.b))} → USD ${F(u(r.r))}</div></div><div class="alert-pct" style="font-size:28px;color:#DC2626">${P(r.dp)}</div></div>`});
    D.rb.filter(r=>r.dp>15&&r.dp<=50).forEach(r=>{h+=`<div class="alert" style="background:#FFFBEB;border-left:4px solid #D97706" onclick="view='rub';render();setTimeout(()=>showDetail(${r.id}),50)"><div><div class="alert-tag" style="color:#D97706">ALERTA</div><div class="alert-name">${r.n}</div></div><div class="alert-pct" style="font-size:22px;color:#D97706">${P(r.dp)}</div></div>`});
    D.rb.filter(r=>r.dp<-20).forEach(r=>{h+=`<div class="alert" style="background:#EFF6FF;border-left:4px solid #2563EB" onclick="view='rub';render();setTimeout(()=>showDetail(${r.id}),50)"><div><div class="alert-tag" style="color:#2563EB">SUB-EJECUCIÓN</div><div class="alert-name">${r.n}</div></div><div class="alert-pct" style="font-size:22px;color:#2563EB">${P(r.dp)}</div></div>`});
    h+=`<div style="margin-top:6px"><div style="font-size:12px;font-weight:800;color:#059669;margin-bottom:6px">✓ En rango (${D.rb.filter(r=>Math.abs(r.dp)<=15).length})</div><div>`;
    D.rb.filter(r=>Math.abs(r.dp)<=15).forEach(r=>{h+=`<span class="tag-ok" onclick="view='rub';render();setTimeout(()=>showDetail(${r.id}),50)">${r.n} <span style="color:#059669">${P(r.dp)}</span></span>`});
    h+=`</div></div>`;el.innerHTML=h;
  }

  else if(view==='detail'){
    const r=D.rb.find(x=>x.id===window._selId);if(!r){view='rub';render();return;}
    const s=ST(r.dp);
    h+=`<button onclick="view='rub';render()" style="background:none;border:none;color:#3B82F6;font-size:12px;font-weight:600;cursor:pointer;padding:0;margin-bottom:8px">← Rubros</button>`;
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><h2 style="font-size:18px;font-weight:800;margin:0">${r.n}</h2><span class="badge" style="background:${s.bg};color:${s.c};font-size:10px;padding:4px 12px">${s.l}</span></div>`;
    h+=`<div class="row">${kpiSm('Presupuesto','USD '+F(u(r.b)))}${kpiSm('Ejecutado','USD '+F(u(r.r)),'','#2563EB')}${kpiSm('Desvío',P(r.dp),'',''+s.c)}</div>`;
    h+=`<div class="row"><div class="card chart"><div class="section-title">Mensual (USD K)</div><div style="height:230px"><canvas id="ch6"></canvas></div></div><div class="card chart"><div class="section-title">Curva S (USD K)</div><div style="height:230px"><canvas id="ch7"></canvas></div></div></div>`;
    el.innerHTML=h;
    setTimeout(()=>{
      makeChart('ch6','bar',D.ml.slice(0,12),[{label:'Plan',data:r.mp.slice(0,12).map(v=>Math.round(u(v)/1e3)),backgroundColor:'#DBEAFE'},{label:'Real',data:r.mr.map(v=>Math.round(u(v)/1e3)),backgroundColor:'#A7F3D0'}]);
      let cp=0,cr2=0;const cumP=[],cumR=[];
      D.ml.forEach((m,i)=>{cp+=r.mp[i];cumP.push(Math.round(u(cp)/1e3));if(i<r.mr.length){cr2+=r.mr[i];cumR.push(Math.round(u(cr2)/1e3))}else{cumR.push(null)}});
      makeChart('ch7','line',D.ml,[{label:'Plan',data:cumP,borderColor:'#3B82F6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3},{label:'Real',data:cumR,borderColor:'#059669',borderWidth:2.5,pointRadius:2,tension:.3}]);
    },50);
  }
}

function showDetail(id){window._selId=id;view='detail';render()}

// Init
document.getElementById('tcDisplay').textContent=tc.toLocaleString();
render();
</script>
</body>
</html>
